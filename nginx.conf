# ==========================================================
# Article Check — Nginx 反向代理配置
# PPT 规范: Nginx 提供前端资源访问和后端接口转发
# ==========================================================

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # 字符集
    charset utf-8;

    # 上传大小限制（论文文件可能较大）
    client_max_body_size 50M;

    # ─── 健康检查 ──────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ─── API 反向代理 ──────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（流式审查结果）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # WebSocket 支持（未来扩展）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── 官方登录代理（平台 /prod-api 链路）──────────────
    # 本地 Docker 验证时转发到项目方线上平台；正式部署到平台域名后，
    # 可将此段替换为平台内网网关或直接由平台网关接管。
    location /prod-api/ {
        proxy_pass http://120.46.182.118;
        proxy_set_header Host 120.46.182.118;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_intercept_errors off;
        proxy_read_timeout 120s;
    }

    # ─── 静态前端资源 ──────────────────────────────────
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SPA 路由 — 非文件请求回退 index.html
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ─── 静态文件直接服务（优化）───────────────────────
    location /assets/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── 安全头 ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
